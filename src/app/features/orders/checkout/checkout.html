<div class="checkout-page container mt-5">

  <div class="checkout-card">

    <h3 class="checkout-title text-center mb-4">🧾 Checkout</h3>

    <!-- USER INFO -->
    <div class="user-info mb-4">
      <p><span>Name:</span> {{ user?.name }}</p>
      <p><span>Email:</span> {{ user?.email }}</p>
    </div>

    <!-- FORM -->
    <div class="form-group mb-3">
      <label>📞 Phone Number</label>
      <input type="text" class="form-control custom-input" placeholder="Enter your phone number"
        [(ngModel)]="phoneNumber">
    </div>

    <div class="form-group mb-4">
      <label>📍 Delivery Address</label>
      <textarea class="form-control custom-input" rows="3" placeholder="Enter your full address with PIN code"
        [(ngModel)]="address"></textarea>
    </div>

    <!-- BUTTON -->
    <button class="place-order-btn w-100" [disabled]="!phoneNumber || !address" (click)="showSuccess(); placeOrder()">
      🚀 Confirm & Place Order
    </button>

  </div>

</div>

<!-- SUCCESS OVERLAY -->
<div class="success-overlay" *ngIf="orderSuccess">

  <div class="success-box">

    <div class="checkmark-circle">
      ✔
    </div>

    <h3>Order Placed!</h3>
    <p>Your order was placed successfully 🎉</p>

  </div>

</div>
