<div class="container mt-4 admin-orders">

  <!-- Header -->
  <div class="page-header mb-4">
    <h2>Manage Orders</h2>
    <p>Track and manage customer orders</p>
  </div>

  <!-- Orders -->
  <div *ngFor="let o of orders" class="order-card mb-3"
       [ngClass]="{
         'approved': o.status === 'Approved',
         'cancelled': o.status === 'Cancelled',
         'pending': o.status === 'Pending'
       }">

    <!-- Top Section -->
    <div class="order-top d-flex justify-content-between align-items-center">
      <div>
        <h5 class="mb-1">{{ o.userName }}</h5>
        <small>{{ o.userEmail }}</small>
      </div>

      <span class="status-badge">
        {{ o.status }}
      </span>
    </div>

    <!-- Info -->
    <div class="order-info mt-3">
      <p><b>📞</b> {{ o.phoneNumber }}</p>
      <p><b>📍</b> {{ o.address }}</p>
    </div>

    <!-- Products -->
    <div class="order-products mt-3">
      <p class="mb-1"><b>Products:</b></p>
      <ul>
        <li *ngFor="let item of o.items">
          {{ item.productName }} <span>(x{{ item.quantity }})</span>
        </li>
      </ul>
    </div>

    <!-- Actions -->
    <div class="order-actions mt-3 d-flex gap-2">
      <button class="btn approve-btn flex-fill" (click)="approve(o.id)">
        ✔ Approve
      </button>

      <button class="btn cancel-btn flex-fill" (click)="cancel(o.id)">
        ✖ Cancel
      </button>
    </div>

  </div>

</div>
