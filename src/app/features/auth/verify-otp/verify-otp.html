<div class="otp-wrapper">

  <div class="container d-flex justify-content-center align-items-center">

    <div class="otp-card">

      <h2 class="text-center mb-4">Verify OTP 🔐</h2>

      <!-- OTP Section -->
      <div *ngIf="!showRegisterForm">

        <div class="mb-3">
          <label>Enter OTP</label>
          <input type="text"
                 class="form-control otp-input"
                 [(ngModel)]="otp"
                 name="otp">
        </div>

        <button class="btn otp-btn w-100" (click)="verifyOtp()">
          Verify OTP
        </button>

      </div>

      <!-- Register Form -->
      <div *ngIf="showRegisterForm" class="mt-3">

        <h4 class="text-center mb-3">Complete Registration</h4>

        <div class="mb-3">
          <label>Name</label>
          <input type="text"
                 class="form-control otp-input"
                 [(ngModel)]="name"
                 name="name">
        </div>

        <div class="mb-3">
          <label>Password</label>
          <input type="password"
                 class="form-control otp-input"
                 [(ngModel)]="password"
                 name="password">
        </div>

        <button class="btn otp-btn w-100" (click)="register()">
          Register
        </button>

      </div>

    </div>

  </div>

</div>
